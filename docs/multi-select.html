<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>複選題強化｜就業服務乙級 AI 闖關學習系統</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="app-header"></div>
<main>
<section>
<div class="container quiz-layout">

  <!-- Main -->
  <div>
    <!-- VIP gate overlay (shown for non-VIP after free preview) -->
    <div id="multi-vip-gate" class="card" style="display:none;text-align:center;padding:60px 32px">
      <div style="font-size:56px;margin-bottom:16px">⭐</div>
      <h2 style="margin-bottom:10px">複選題強化需要 VIP</h2>
      <p style="margin-bottom:28px;max-width:380px;margin-left:auto;margin-right:auto">
        免費版已體驗前 <strong>5 題</strong>複選練習。升級 VIP 解鎖完整複選題強化模式。
      </p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <a href="pricing.html" class="btn btn-vip btn-lg">⭐ 立即升級 VIP</a>
        <a href="quiz.html"    class="btn btn-secondary btn-lg">繼續快速練習</a>
      </div>
    </div>

    <!-- Loading -->
    <div id="multi-loading" class="quiz-card" style="text-align:center;padding:60px 28px">
      <div class="spinner" style="margin:0 auto 16px"></div>
      <div style="font-weight:700;color:var(--muted)">載入複選題庫…</div>
    </div>

    <!-- Quiz content (reuses quiz layout) -->
    <div id="multi-content" class="quiz-card" style="display:none">
      <div class="quiz-topbar">
        <span class="quiz-progress-text" id="m-progress">1 / ?</span>
        <span class="badge badge-orange" style="font-size:13px">✅✅ 複選題強化模式</span>
        <button class="btn btn-secondary btn-sm" id="m-home-btn">🏠 返回首頁</button>
      </div>
      <div class="progress-wrap mb-4">
        <div class="progress-bar" id="m-progress-bar" style="width:10%"></div>
      </div>
      <div class="quiz-meta">
        <span class="badge badge-orange">✅ 複選題</span>
        <span class="badge badge-purple" id="m-cat-badge">類別</span>
      </div>
      <h2 class="quiz-question-title" id="m-title">題目載入中…</h2>
      <div class="notice-box warning mb-16">✅ 複選題：可選擇多個選項，選完後再按「確認送出」。</div>
      <div id="m-options"></div>
      <div class="quiz-actions">
        <button class="btn btn-secondary" id="m-prev-btn" disabled>← 上一題</button>
        <button class="btn btn-primary"   id="m-submit-btn">確認送出</button>
        <button class="btn btn-dark"      id="m-next-btn" style="display:none">下一題 →</button>
      </div>
      <div id="m-analysis" style="display:none"></div>
    </div>

    <!-- Error -->
    <div id="multi-error" class="quiz-card" style="display:none;text-align:center;padding:60px">
      <div style="font-size:48px;margin-bottom:16px">⚠️</div>
      <h3>載入失敗</h3>
      <p style="margin-bottom:20px">請重新整理或稍後再試。</p>
      <button class="btn btn-primary" onclick="location.reload()">重新整理</button>
    </div>
  </div>

  <!-- Side -->
  <div class="quiz-side-card">
    <div class="side-title">複選題強化</div>
    <div class="notice-box warning mb-16" style="font-size:13px">✅✅ 本模式只包含複選題，專項訓練高失分題型。</div>
    <div class="stat-row"><span>已作答</span><span class="stat-val" id="m-side-answered">0</span></div>
    <div class="stat-row"><span>答對</span><span class="stat-val" style="color:var(--success-dark)" id="m-side-correct">0</span></div>
    <div class="stat-row"><span>答錯</span><span class="stat-val" style="color:var(--danger-dark)"  id="m-side-wrong">0</span></div>
    <div class="divider"></div>
    <a href="index.html"    class="btn btn-secondary btn-block btn-sm mb-8">🏠 首頁</a>
    <a href="pricing.html"  class="btn btn-vip btn-block btn-sm">⭐ 升級 VIP</a>
    <div class="divider"></div>
    <div style="font-size:12px;color:var(--muted);font-weight:600;line-height:1.7">
      💡 複選題提示：全部選對才算答對，少選或多選都算錯。
    </div>
  </div>

</div>
</section>
</main>
<div id="app-footer"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/app.js?v=2"></script>
<script src="assets/js/auth.js?v=2"></script>
<script src="assets/js/questions-data.js"></script>
<script src="assets/js/quiz-engine.js"></script>
<script>
(function() {
  var FREE_LIMIT = APP_CONFIG.FREE.MULTI_FREE_COUNT;
  var user = Store.get(APP_CONFIG.KEYS.USER);
  var isVip = VipUtils.isVipActive(user);
  var correctCount = 0, wrongCount = 0, answeredCount = 0;

  var elLoading  = document.getElementById('multi-loading');
  var elContent  = document.getElementById('multi-content');
  var elError    = document.getElementById('multi-error');
  var elGate     = document.getElementById('multi-vip-gate');
  var elProgress = document.getElementById('m-progress');
  var elProgBar  = document.getElementById('m-progress-bar');
  var elCatBadge = document.getElementById('m-cat-badge');
  var elTitle    = document.getElementById('m-title');
  var elOptions  = document.getElementById('m-options');
  var elAnalysis = document.getElementById('m-analysis');
  var elPrevBtn  = document.getElementById('m-prev-btn');
  var elSubmitBtn= document.getElementById('m-submit-btn');
  var elNextBtn  = document.getElementById('m-next-btn');
  var elHomeBtn  = document.getElementById('m-home-btn');

  function showQuestion() {
    var idx   = QuizEngine.getCurrentIndex();
    var q     = QuizEngine.getCurrentQuestion();
    var total = QuizEngine.getTotalCount();
    if (!q) return;
    var submitted = QuizEngine.isSubmitted();

    /* VIP gate after free preview */
    if (!isVip && idx >= FREE_LIMIT && !submitted) {
      elContent.style.display = 'none';
      elGate.style.display    = 'block';
      return;
    }

    elProgress.textContent  = (idx+1) + ' / ' + total;
    elProgBar.style.width   = ((idx+1)/total*100) + '%';
    elCatBadge.textContent  = '#' + q.category;
    elTitle.textContent     = q.title;
    elOptions.innerHTML     = QuizEngine.renderOptions(idx);
    elAnalysis.style.display= submitted ? 'block' : 'none';
    if (submitted) elAnalysis.innerHTML = QuizEngine.renderAnalysis();
    elPrevBtn.disabled       = QuizEngine.isFirstQuestion();
    elSubmitBtn.style.display= submitted ? 'none' : 'inline-flex';
    elNextBtn.style.display  = submitted ? 'inline-flex' : 'none';
    elNextBtn.textContent    = QuizEngine.isLastQuestion() ? '🏁 完成作答' : '下一題 →';
    document.getElementById('m-side-answered').textContent = answeredCount;
    document.getElementById('m-side-correct').textContent  = correctCount;
    document.getElementById('m-side-wrong').textContent    = wrongCount;
  }

  elSubmitBtn.addEventListener('click', function() {
    var ans = QuizEngine.getAnswer();
    if (!ans || ans.length === 0) { Toast.warning('請先選擇答案'); return; }
    var r = QuizEngine.submitCurrent();
    if (!r) return;
    answeredCount++;
    if (r.isCorrect) correctCount++; else wrongCount++;
    showQuestion();
  });
  elNextBtn.addEventListener('click', function() {
    if (QuizEngine.isLastQuestion()) {
      var stats = QuizEngine.finishSession();
      QuizEngine.updateStudyStats(stats);
      location.href = 'result.html';
    } else {
      QuizEngine.moveNext(); showQuestion();
      window.scrollTo({ top:0, behavior:'smooth' });
    }
  });
  elPrevBtn.addEventListener('click', function() {
    QuizEngine.movePrev(); showQuestion();
    window.scrollTo({ top:0, behavior:'smooth' });
  });
  elHomeBtn.addEventListener('click', function() {
    Modal.confirm({ title:'確定離開？', body:'離開後本次進度將不保存。',
      okText:'確定離開', okClass:'btn-danger', cancelText:'繼續練習'
    }).then(function(ok){ if(ok) location.href='index.html'; });
  });

  document.addEventListener('DOMContentLoaded', function() {
    QuizEngine.init('multi').then(function(ok) {
      elLoading.style.display = 'none';
      if (ok && QuizEngine.getTotalCount() > 0) {
        elContent.style.display = 'block';
        showQuestion();
      } else {
        elError.style.display = 'block';
      }
    }).catch(function() {
      elLoading.style.display = 'none';
      elError.style.display = 'block';
    });
  });
})();
</script>
</body>
</html>
