<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>忘記密碼｜就業服務乙級 AI 闖關學習系統</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="app-header"></div>
<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo-wrap">
      <div style="font-size:48px;margin-bottom:8px">🔑</div>
    </div>
    <h1 class="auth-title">重設密碼</h1>
    <p class="auth-sub">輸入你的電子郵件，我們會寄送密碼重設連結給你。</p>

    <div id="fp-success" class="notice-box success mb-16" style="display:none">
      ✅ 重設連結已寄出！請檢查你的信箱（包含垃圾郵件資料夾）。
    </div>
    <div id="fp-error" class="notice-box danger mb-16" style="display:none"></div>

    <form id="fp-form" onsubmit="FPPage.submit(event)">
      <div class="form-group">
        <label class="form-label">電子郵件 <span class="req">*</span></label>
        <input type="email" id="fp-email" class="form-control" placeholder="your@email.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="fp-btn">寄送重設連結</button>
    </form>

    <div style="margin-top:20px;text-align:center">
      <a href="login.html" style="font-size:13px;color:var(--muted);font-weight:700">← 返回登入頁</a>
    </div>
  </div>
</main>
<div id="app-footer"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/app.js?v=2"></script>
<script src="assets/js/auth.js?v=2"></script>
<script>
window.FPPage = {
  submit: function(e) {
    e.preventDefault();
    var email = document.getElementById('fp-email').value.trim();
    var btn   = document.getElementById('fp-btn');
    var errEl = document.getElementById('fp-error');
    var okEl  = document.getElementById('fp-success');
    errEl.style.display = 'none';
    btn.disabled = true; btn.textContent = '寄送中…';

    Auth.forgotPassword(email).then(function(r) {
      if (r.ok) {
        okEl.style.display  = 'block';
        document.getElementById('fp-form').style.display = 'none';
      } else {
        errEl.textContent = r.message || '寄送失敗，請稍後再試';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = '寄送重設連結';
      }
    });
  }
};
</script>
</body>
</html>
