<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>API 測試｜就業服務乙級 AI 闖關學習系統</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="app-header"></div>
<main>
<section class="section-xs">
  <div class="container" style="max-width:720px">
    <h2 style="margin-bottom:4px">🔧 工程測試頁面</h2>
    <p style="color:var(--muted);margin-bottom:28px">驗證後端 API 連線狀態與 localStorage 資料。</p>

    <!-- Ping -->
    <div class="card mb-20">
      <h3 class="mb-16">連線測試（Ping）</h3>
      <button class="btn btn-primary btn-sm" onclick="TestPage.ping()">Ping API</button>
      <pre id="tp-ping" class="mb-0" style="margin-top:12px;background:var(--bg-2);padding:12px;border-radius:8px;font-size:13px;min-height:40px;white-space:pre-wrap"></pre>
    </div>

    <!-- getQuestions -->
    <div class="card mb-20">
      <h3 class="mb-16">GET getQuestions</h3>
      <button class="btn btn-primary btn-sm" onclick="TestPage.getQuestions()">Send Request</button>
      <pre id="tp-questions" style="margin-top:12px;background:var(--bg-2);padding:12px;border-radius:8px;font-size:13px;min-height:40px;white-space:pre-wrap"></pre>
    </div>

    <!-- POST login -->
    <div class="card mb-20">
      <h3 class="mb-16">POST login</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
        <input type="email" id="tp-email" class="form-control" placeholder="email" style="max-width:200px">
        <input type="password" id="tp-pw" class="form-control" placeholder="password" style="max-width:160px">
        <button class="btn btn-primary btn-sm" onclick="TestPage.login()">Send Login</button>
      </div>
      <pre id="tp-login" style="background:var(--bg-2);padding:12px;border-radius:8px;font-size:13px;min-height:40px;white-space:pre-wrap"></pre>
    </div>

    <!-- LocalStorage inspector -->
    <div class="card mb-20">
      <h3 class="mb-16">LocalStorage 狀態</h3>
      <button class="btn btn-secondary btn-sm" onclick="TestPage.inspectLS()">重新整理</button>
      <button class="btn btn-danger btn-sm" style="margin-left:8px" onclick="TestPage.clearLS()">清除全部</button>
      <div id="tp-ls" style="margin-top:12px;font-size:13px"></div>
    </div>

  </div>
</section>
</main>
<div id="app-footer"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/app.js?v=2"></script>
<script src="assets/js/auth.js?v=2"></script>
<script>
window.TestPage = {
  _show: function(id, data) {
    document.getElementById(id).textContent = JSON.stringify(data, null, 2);
  },
  ping: function() {
    document.getElementById('tp-ping').textContent = '請求中…';
    Api.get('ping').then(function(r){ TestPage._show('tp-ping', r); })
      .catch(function(e){ document.getElementById('tp-ping').textContent = '❌ ' + e.message; });
  },
  getQuestions: function() {
    document.getElementById('tp-questions').textContent = '請求中…';
    var user = Store.get(APP_CONFIG.KEYS.USER);
    Api.get('getQuestions', user ? { token: user.token || '' } : {})
      .then(function(r){ TestPage._show('tp-questions', { count: (r.questions||r.data||[]).length, ok: r.ok||r.success, sample: (r.questions||r.data||[])[0] }); })
      .catch(function(e){ document.getElementById('tp-questions').textContent = '❌ ' + e.message; });
  },
  login: function() {
    var email = document.getElementById('tp-email').value.trim();
    var pw    = document.getElementById('tp-pw').value;
    document.getElementById('tp-login').textContent = '請求中…';
    Auth.login(email, pw).then(function(r){ TestPage._show('tp-login', r); })
      .catch(function(e){ document.getElementById('tp-login').textContent = '❌ ' + e.message; });
  },
  inspectLS: function() {
    var keys = Object.values(APP_CONFIG.KEYS);
    var el = document.getElementById('tp-ls');
    el.innerHTML = keys.map(function(k) {
      var raw = localStorage.getItem(k);
      var val = raw ? JSON.parse(raw) : null;
      var summary = val === null ? '<span style="color:var(--muted)">（空）</span>'
        : Array.isArray(val) ? '<span style="color:var(--primary)">[陣列 ' + val.length + ' 筆]</span>'
        : typeof val === 'object' ? '<span style="color:var(--success-dark)">{物件}</span>'
        : '<span>' + String(val).substring(0,60) + '</span>';
      return '<div class="stat-row"><span style="font-family:monospace;font-size:12px">' + k + '</span>' + summary + '</div>';
    }).join('');
  },
  clearLS: function() {
    Modal.confirm({ title:'清除 LocalStorage', body:'確定要清除所有學習資料嗎？此操作無法復原。', okText:'清除', okClass:'btn-danger' })
      .then(function(ok) {
        if (!ok) return;
        Object.values(APP_CONFIG.KEYS).forEach(function(k){ localStorage.removeItem(k); });
        Toast.success('已清除');
        TestPage.inspectLS();
      });
  }
};
document.addEventListener('DOMContentLoaded', function() { TestPage.inspectLS(); });
</script>
</body>
</html>
