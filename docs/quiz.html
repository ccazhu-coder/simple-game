  <meta charset="utf-8">

  <meta name="keywords" content="就業服務乙級,就業服務乙級題庫,就業服務乙級練習題,就業服務乙級學科,就業服務乙級考試,就業服務法,職業訓練法,勞動基準法,乙級技術士,就服乙級,就業服務乙級AI">

  <link rel="canonical" href="https://ccazhu-coder.github.io/simple-game/quiz.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="快速練習｜就業服務乙級 AI 闖關學習系統">
  <meta property="og:description" content="就業服務乙級學科快速練習題庫，AI 教練即時解析考點、口訣與常見陷阱。">
  <meta property="og:url" content="https://ccazhu-coder.github.io/simple-game/quiz.html">
  <meta property="og:image" content="https://ccazhu-coder.github.io/simple-game/assets/img/logo-zhiji-zhitu.jpg">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="快速練習｜就業服務乙級 AI 闖關學習系統">
  <meta name="twitter:description" content="就業服務乙級學科快速練習題庫，AI 教練即時解析考點、口訣與常見陷阱。">
  <meta name="twitter:image" content="https://ccazhu-coder.github.io/simple-game/assets/img/logo-zhiji-zhitu.jpg">

</head>
<body>
<div id="app-header"></div>
<main>
<section>
<div class="container quiz-layout">

  <!-- ── Main quiz card ──────────────────────────────────── -->
  <div>
    <!-- Loading state -->
    <div id="quiz-loading" class="quiz-card" style="text-align:center;padding:60px 28px">
      <div class="spinner" style="margin:0 auto 16px"></div>
      <div style="font-weight:700;color:var(--muted)">正在載入題目…</div>
    </div>

    <!-- Quiz content -->
    <div id="quiz-content" class="quiz-card" style="display:none">
      <!-- Top bar -->
      <div class="quiz-topbar">
        <span class="quiz-progress-text" id="q-progress">1 / 10</span>
        <div class="exam-timer" id="q-timer" style="font-size:14px;padding:6px 14px;display:none">⏱ 00:00</div>
        <button class="btn btn-secondary btn-sm" id="q-home-btn">🏠 返回首頁</button>
      </div>

      <!-- Progress bar -->
      <div class="progress-wrap mb-4">
        <div class="progress-bar" id="q-progress-bar" style="width:10%"></div>
      </div>

      <!-- Meta badges -->
      <div class="quiz-meta">
        <span class="badge badge-blue" id="q-type-badge">單選題</span>
        <span class="badge badge-purple" id="q-cat-badge">類別</span>
      </div>

      <!-- Question -->
      <h2 class="quiz-question-title" id="q-title">題目載入中…</h2>

      <!-- Options -->
      <div id="q-options"></div>

      <!-- Multi-select hint -->
      <div id="q-multi-hint" class="notice-box warning mb-16" style="display:none">
        ✅ 複選題：可選擇多個答案，選完後再按「確認送出」。
      </div>

      <!-- Actions -->
      <div class="quiz-actions">
        <button class="btn btn-secondary" id="q-prev-btn" disabled>← 上一題</button>
        <button class="btn btn-primary"   id="q-submit-btn">確認送出</button>
        <button class="btn btn-dark"      id="q-next-btn" style="display:none">下一題 →</button>
      </div>

      <!-- Analysis -->
      <div id="q-analysis" style="display:none"></div>
    </div>

    <!-- Error state -->
    <div id="quiz-error" class="quiz-card" style="display:none;text-align:center;padding:60px 28px">
      <div style="font-size:48px;margin-bottom:16px">⚠️</div>
      <h3 style="margin-bottom:8px">題目載入失敗</h3>
      <p style="margin-bottom:24px">無法連接後端 API，請檢查網路連線後重新整理。</p>
      <button class="btn btn-primary" onclick="location.reload()">重新整理</button>
      <a href="index.html" class="btn btn-secondary" style="margin-left:10px">返回首頁</a>
    </div>
  </div>

  <!-- ── Side card ────────────────────────────────────────── -->
  <div class="quiz-side-card">
    <div class="side-title">本次練習</div>
    <div id="side-mode-badge" class="notice-box info mb-16">快速練習</div>

    <div class="stat-row"><span>已作答</span><span class="stat-val" id="side-answered">0</span></div>
    <div class="stat-row"><span>答對</span><span class="stat-val" style="color:var(--success-dark)" id="side-correct">0</span></div>
    <div class="stat-row"><span>答錯</span><span class="stat-val" style="color:var(--danger-dark)"  id="side-wrong">0</span></div>
    <div class="stat-row"><span>剩餘</span><span class="stat-val" id="side-remaining">—</span></div>

    <div class="divider"></div>

    <div class="side-title">快速操作</div>
    <a href="index.html" class="btn btn-secondary btn-block btn-sm mb-8">🏠 返回首頁</a>
    <a href="pricing.html" class="btn btn-vip btn-block btn-sm">⭐ 升級 VIP</a>

    <div class="divider"></div>
    <div style="font-size:12px;color:var(--muted);font-weight:600;line-height:1.6">
      💡 提示：提交後才能查看 AI 解析與前往下一題。
    </div>
  </div>

</div>
</section>
</main>
<div id="app-footer"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/app.js?v=2"></script>
<script src="assets/js/auth.js?v=2"></script>
<script src="assets/js/questions-data.js"></script>
<script src="assets/js/quiz-engine.js"></script>
<script>
(function() {
  /* ── State ─────────────────────────────────────────────── */
  var mode = App.param('mode') || 'quick';
  var correctCount = 0, wrongCount = 0;

  /* ── DOM refs ───────────────────────────────────────────── */
  var elLoading   = document.getElementById('quiz-loading');
  var elContent   = document.getElementById('quiz-content');
  var elError     = document.getElementById('quiz-error');
  var elProgress  = document.getElementById('q-progress');
  var elProgBar   = document.getElementById('q-progress-bar');
  var elTypeBadge = document.getElementById('q-type-badge');
  var elCatBadge  = document.getElementById('q-cat-badge');
  var elTitle     = document.getElementById('q-title');
  var elOptions   = document.getElementById('q-options');
  var elMultiHint = document.getElementById('q-multi-hint');
  var elAnalysis  = document.getElementById('q-analysis');
  var elPrevBtn   = document.getElementById('q-prev-btn');
  var elSubmitBtn = document.getElementById('q-submit-btn');
  var elNextBtn   = document.getElementById('q-next-btn');
  var elHomeBtn   = document.getElementById('q-home-btn');
  var elSideMode  = document.getElementById('side-mode-badge');

  /* ── Mode label ─────────────────────────────────────────── */
  var modeLabels = { quick:'快速練習', multi:'複選強化', wrong:'錯題複習' };
  if (elSideMode) elSideMode.textContent = modeLabels[mode] || '快速練習';

  /* ── Render current question ────────────────────────────── */
  function showQuestion() {
    var idx   = QuizEngine.getCurrentIndex();
    var q     = QuizEngine.getCurrentQuestion();
    var total = QuizEngine.getTotalCount();
    if (!q) return;

    var submitted = QuizEngine.isSubmitted();

    /* progress */
    elProgress.textContent    = (idx+1) + ' / ' + total;
    elProgBar.style.width     = ((idx+1)/total*100) + '%';

    /* type & category */
    elTypeBadge.textContent = q.type === 'multiple' ? '✅ 複選題' : '✓ 單選題';
    elTypeBadge.className   = 'badge ' + (q.type==='multiple' ? 'badge-orange' : 'badge-blue');
    elCatBadge.textContent  = '#' + q.category;

    /* title */
    elTitle.textContent = q.title;

    /* multi hint */
    elMultiHint.style.display = (q.type === 'multiple' && !submitted) ? 'block' : 'none';

    /* options */
    elOptions.innerHTML = QuizEngine.renderOptions(idx);

    /* analysis */
    if (submitted) {
      elAnalysis.innerHTML   = QuizEngine.renderAnalysis();
      elAnalysis.style.display = 'block';
    } else {
      elAnalysis.style.display = 'none';
    }

    /* buttons */
    elPrevBtn.disabled         = QuizEngine.isFirstQuestion();
    elSubmitBtn.style.display  = submitted ? 'none' : 'inline-flex';
    elNextBtn.style.display    = submitted ? 'inline-flex' : 'none';
    elNextBtn.textContent      = QuizEngine.isLastQuestion() ? '🏁 完成作答' : '下一題 →';

    /* side stats */
    document.getElementById('side-answered').textContent  = QuizEngine.getSubmittedCount();
    document.getElementById('side-correct').textContent   = correctCount;
    document.getElementById('side-wrong').textContent     = wrongCount;
    document.getElementById('side-remaining').textContent = total - idx - 1;
  }

  /* ── Submit ─────────────────────────────────────────────── */
  elSubmitBtn.addEventListener('click', function() {
    var ans = QuizEngine.getAnswer();
    if (!ans || ans.length === 0) { Toast.warning('請先選擇答案再送出'); return; }
    var result = QuizEngine.submitCurrent();
    if (!result) { Toast.warning('請先選擇答案再送出'); return; }
    if (result.isCorrect) correctCount++; else wrongCount++;
    showQuestion();
    elAnalysis.scrollIntoView({ behavior:'smooth', block:'nearest' });
  });

  /* ── Next ───────────────────────────────────────────────── */
  elNextBtn.addEventListener('click', function() {
    if (QuizEngine.isLastQuestion()) {
      elNextBtn.disabled = true; elNextBtn.textContent = '計算成績…';
      var stats = QuizEngine.finishSession();
      QuizEngine.updateStudyStats(stats);
      setTimeout(function(){ location.href = 'result.html'; }, 400);
    } else {
      QuizEngine.moveNext();
      showQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  });

  /* ── Prev ───────────────────────────────────────────────── */
  elPrevBtn.addEventListener('click', function() {
    QuizEngine.movePrev();
    showQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  /* ── Home ───────────────────────────────────────────────── */
  elHomeBtn.addEventListener('click', function() {
    var hasAnswers = QuizEngine.getTotalCount() > 0;
    if (!hasAnswers) { location.href = 'index.html'; return; }
    Modal.confirm({
      title: '確定要離開？',
      body: '離開後本次答題進度將不會被保存（已提交的答案已記入錯題本）。',
      okText: '確定離開', okClass: 'btn-danger', cancelText: '繼續作答'
    }).then(function(ok) { if (ok) location.href = 'index.html'; });
  });

  /* ── Init ───────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', function() {
    QuizEngine.init(mode).then(function(ok) {
      elLoading.style.display = 'none';
      if (ok && QuizEngine.getTotalCount() > 0) {
        elContent.style.display = 'block';
        showQuestion();
        QuizEngine.prerender(1);
      } else {
        elError.style.display = 'block';
      }
    }).catch(function() {
      elLoading.style.display = 'none';
      elError.style.display   = 'block';
    });
  });
})();
</script>
</body>
</html>
